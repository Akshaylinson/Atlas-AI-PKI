name: atlas
description: Atlas - Personal Intelligence Operating System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  graphview: ^1.2.0
  timeline_tile: ^2.0.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_colorpicker: ^1.1.0
  emoji_picker_flutter: ^2.1.0

  # File & Media
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  record: ^6.0.0
  just_audio: ^0.9.39
  video_player: ^2.8.6
  photo_view: ^0.14.0
  open_filex: ^4.4.1
  mime: ^1.0.5

  # Storage & Encryption
  encrypt: ^5.0.3
  flutter_secure_storage: 10.3.1
  shared_preferences: ^2.3.1

  # Search & Text
  fuzzywuzzy: ^1.1.0
  html: ^0.15.4

  # AI
  flutter_gemma: ^0.8.1

  # Package
  archive: ^3.6.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.20.0
  collection: ^1.18.0
  rxdart: ^0.27.7
  async: ^2.11.0
  logger: ^2.4.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.19.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/gemma/config.json
    - assets/models/gemma/metadata.json
    - assets/models/gemma/tokenizer.json
    - assets/icons/
    - assets/animations/
